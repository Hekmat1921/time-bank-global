name: Run Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'  # هر ۵ دقیقه یکبار اجرا بشه

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - run: node bot.js
