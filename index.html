<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بانک زمان جهانی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazir', Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            direction: rtl;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            text-align: center;
            opacity: 0.9;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.2);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            display: block;
            margin: 10px 0;
        }

        .stat-label {
            opacity: 0.8;
            font-size: 0.9rem;
        }

        .update-time {
            text-align: center;
            opacity: 0.7;
            font-size: 0.8rem;
            margin-top: 20px;
        }

        .telegram-link {
            display: inline-block;
            background: #0088cc;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 20px;
            transition: background 0.3s ease;
            font-weight: bold;
        }

        .telegram-link:hover {
            background: #006699;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .error {
            background: rgba(255,0,0,0.2);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            margin: 20px 0;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .stat-number {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 بانک زمان جهانی</h1>
        <p class="subtitle">هر ۱ دقیقه یادگیری = ۱ زمان‌کوین</p>

        <div id="stats-container">
            <div class="loading">⏳ در حال بارگذاری آمار...</div>
        </div>

        <div style="text-align: center;">
            <a href="https://t.me/TimeBankGlobalBot" class="telegram-link" target="_blank">
                🤖 شروع کن! ربات تلگرام
            </a>
        </div>

        <div class="footer">
            🌟 با هم دنیا رو تغییر می‌دیم
        </div>
    </div>

    <script>
        // ===== بارگذاری آمار از فایل JSON =====
        async function loadStats() {
            try {
                const response = await fetch('data.json?t=' + new Date().getTime()); // جلوگیری از کش
                const data = await response.json();
                
                const stats = data.stats || { totalUsers: 0, totalLearns: 0 };
                const users = data.users || {};
                
                // محاسبه کل زمان‌کوین‌ها
                let totalCoins = 0;
                for (let userId in users) {
                    totalCoins += users[userId].balance || 0;
                }

                const statsHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="stat-label">👥 کاربران</span>
                            <span class="stat-number">${stats.totalUsers || 0}</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">🧠 یادگیری‌ها</span>
                            <span class="stat-number">${stats.totalLearns || 0}</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">💰 زمان‌کوین</span>
                            <span class="stat-number">${totalCoins}</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">⏳ زمان (دقیقه)</span>
                            <span class="stat-number">${stats.totalLearns || 0}</span>
                        </div>
                    </div>
                    <div class="update-time">
                        آخرین بروزرسانی: ${new Date().toLocaleString('fa-IR')}
                    </div>
                `;

                document.getElementById('stats-container').innerHTML = statsHTML;

            } catch (error) {
                document.getElementById('stats-container').innerHTML = `
                    <div class="error">
                        ❌ خطا در بارگذاری آمار. لطفاً دوباره تلاش کنید.
                    </div>
                `;
                console.error('Error loading stats:', error);
            }
        }

        // ===== بارگذاری اولیه =====
        loadStats();

        // ===== بروزرسانی خودکار هر ۳۰ ثانیه =====
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
